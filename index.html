<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>放送原稿</title>
    <!-- Supabase JS Library -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --accent: #0066ff;
            --border: #f0f0f0;
            --card-bg: #ffffff;
            --note-bg: #f8f9fa;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Hiragino Sans", "Meiryo", sans-serif;
            line-height: 1.6; 
            padding: 20px; 
            max-width: 900px; 
            margin: 0 auto; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            -webkit-font-smoothing: antialiased;
        }
        
        #status { display: none; }

        header {
            margin: 0 0 20px 0;
            padding: 0;
        }

        h1 { 
            font-size: 1.4rem; 
            font-weight: 800;
            margin: 0;
            color: var(--text-main);
        }

        /* UI変更：背景の箱をやめ、左ラインのモダンなスタイルに変更 */
        #note-container {
            display: none; 
            margin: 0 0 30px 0; 
            padding: 0 0 0 15px; /* 左側にのみ余白 */
            border-left: 4px solid #ddd; /* 左側のアクセントライン */
            width: 100%;
            box-sizing: border-box;
        }

        .note-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 800;
            display: block;
            margin: 0 !important;
            padding: 0 !important;
            line-height: 1; /* ラベルの上下の隙間をゼロに */
            letter-spacing: 0.05em;
        }

        #note {
            margin: 8px 0 0 0 !important; /* ラベルとの距離をここだけで制御 */
            padding: 0 !important;
            font-size: 0.95rem;
            line-height: 1.6;
            display: block;
            color: var(--text-main);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        #list {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .episode-card { 
            background: var(--card-bg);
            padding-bottom: 30px;
            border-bottom: 2px solid var(--border);
        }
        
        .episode-header { 
            display: flex; 
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: #fcfcfc;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .episode-number {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--accent);
        }

        .episode-date { 
            color: var(--text-main); 
            font-size: 1rem; 
            font-weight: 700;
        }
        .date-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: normal;
            margin-right: 5px;
        }

        .info-sections {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-item {
            display: flex;
            align-items: flex-start;
        }

        .label { 
            flex: 0 0 80px;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-muted);
            padding-top: 5px;
        }

        .content { 
            flex: 1;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-main);
            white-space: pre-wrap;
            word-wrap: break-word;
            min-width: 0;
        }

        @media (max-width: 600px) {
            .info-item {
                flex-direction: column;
            }
            .label {
                flex: none;
                margin-bottom: 2px;
            }
        }
    </style>
</head>
<body>

<div id="status">Connecting</div>

<header>
    <h1>共有中最新データ</h1>
</header>

<div id="note-container">
    <span class="note-label">UPDATE / NOTE</span>
    <div id="note"></div>
</div>

<div id="list"></div>

<script>
(function() {
    const initApp = () => {
        const statusEl = document.getElementById("status");
        const listEl = document.getElementById("list");
        const noteEl = document.getElementById("note");
        const noteContainer = document.getElementById("note-container");

        if (typeof window.supabase === 'undefined') return;

        const SUPABASE_URL = "https://qfzyrogwyjbzbblnvqzy.supabase.co";
        const SUPABASE_KEY = "sb_publishable_tXLLvKe_L-27OsGU-GH3Zw_176oxBqw";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function render(data) {
            if (!data || data.length === 0) return;

            const row = data[0];
            
            const noteText = row.note ? row.note.trim() : "";
            if (noteText && noteText !== "なし" && noteText !== "（なし）") {
                noteEl.innerText = noteText;
                noteContainer.style.display = "block";
            } else {
                noteContainer.style.display = "none";
            }

            let episodes = [];
            try {
                episodes = typeof row.content === 'string' ? JSON.parse(row.content) : row.content;
            } catch (e) {
                console.error("JSON parse error:", e);
                return;
            }
            
            listEl.innerHTML = "";
            episodes.forEach(ep => {
                const card = document.createElement("div");
                card.className = "episode-card";
                card.innerHTML = `
                    <div class="episode-header">
                        <span class="episode-number">放送番号：${ep.number || "未設定"}</span>
                        <span class="episode-date"><span class="date-label">放送日：</span>${ep.date || "未設定"}</span>
                    </div>
                    <div class="info-sections">
                        <div class="info-item">
                            <span class="label">【OP】</span>
                            <span class="content">${ep.opening || "未設定"}</span>
                        </div>
                        <div class="info-item">
                            <span class="label">【企画】</span>
                            <span class="content">${ep.trivia || "未設定"}</span>
                        </div>
                        <div class="info-item">
                            <span class="label">【ED】</span>
                            <span class="content">${ep.ending || "未設定"}</span>
                        </div>
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        async function loadData() {
            try {
                const { data, error } = await supabase
                    .from("broadcasts")
                    .select("*")
                    .order("created_at", { ascending: false })
                    .limit(1);

                if (error) throw error;
                render(data);
                statusEl.innerText = "Live";
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        loadData();
        setInterval(loadData, 1000);
    };

    if (document.readyState === 'complete') {
        initApp();
    } else {
        window.addEventListener('load', initApp);
    }
})();
</script>

</body>
</html>
