<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>データ共有</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --accent: #0066ff;
            --border: #f0f0f0;
            --card-bg: #ffffff;
            --status-color: #10b981;
            --alert-bg: #fee2e2;
            --alert-text: #dc2626;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Hiragino Sans", "Meiryo", sans-serif;
            line-height: 1.6; 
            padding: 20px; 
            max-width: 900px; 
            margin: 0 auto; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            -webkit-font-smoothing: antialiased;
        }

        /* 緊急アラート */
        #emergency-alert {
            display: none;
            background: var(--alert-bg);
            border: 2px solid var(--alert-text);
            color: var(--alert-text);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-weight: 900;
            text-align: center;
            font-size: 1.2rem;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* メタ情報コンテナ */
        #meta-info {
            position: absolute;
            top: 15px;
            right: 15px;
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        #status { 
            font-size: 0.65rem;
            color: var(--status-color);
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px;
        }
        #status::before {
            content: "";
            width: 6px; height: 6px;
            background-color: var(--status-color);
            border-radius: 50%;
        }

        #last-updated {
            font-size: 0.6rem;
            color: #bbb;
            margin-bottom: 4px;
        }

        /* 時計ボタンのデザイン */
        .clock-link {
            display: inline-flex;
            align-items: center;
            background: #f0f7ff;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid #d0e4ff;
            transition: all 0.2s;
        }
        .clock-link:hover {
            background: var(--accent);
            color: white;
        }

        header {
            margin: 0 0 25px 0;
            border-bottom: 2px solid var(--text-main);
            display: inline-block;
        }

        h1 { font-size: 1.5rem; font-weight: 900; padding-bottom: 5px; }

        #note-container {
            display: none; 
            margin: 0 0 35px 0; 
            padding-left: 15px; 
            border-left: 4px solid var(--accent); 
        }

        .note-label {
            font-size: 0.7rem; color: var(--accent); 
            font-weight: 900; letter-spacing: 0.1em;
        }

        #note { margin-top: 10px; font-size: 0.95rem; white-space: pre-wrap; }

        .episode-card { 
            padding-bottom: 30px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 40px;
        }
        
        .episode-header { 
            display: flex; 
            justify-content: space-between;
            background: #f8fafc;
            padding: 12px 15px;
            border-radius: 6px;
            border-left: 4px solid var(--text-main);
            margin-bottom: 20px;
        }

        .episode-number { font-weight: 800; }
        .episode-date { font-weight: 700; font-size: 0.95rem; }

        .label { flex: 0 0 90px; font-size: 0.75rem; font-weight: 800; color: var(--accent); padding-top: 4px; }
        .content { flex: 1; font-weight: 500; white-space: pre-wrap; }

        .info-item { display: flex; margin-bottom: 18px; }

        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center;
            backdrop-filter: blur(4px);
        }
        .modal-content { background: white; padding: 30px; border-radius: 16px; width: 280px; text-align: center; }
        .modal-content input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .modal-content button { width: 100%; padding: 12px; background: var(--text-main); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        @media (max-width: 600px) { .info-item { flex-direction: column; } }
    </style>
</head>
<body>

<div id="emergency-alert">【緊急】メッセージ読み込み中...</div>

<div id="meta-info">
    <div id="status">Connecting</div>
    <div id="last-updated"></div>
    <a href="https://airnote123.github.io/tokei/" target="_blank" class="clock-link">
        🕒 時計を開く
    </a>
</div>

<header><h1>共有中の最新データ</h1></header>

<div id="note-container">
    <span class="note-label">UPDATE / NOTE</span>
    <div id="note"></div>
</div>

<div id="list"></div>

<div id="modal-overlay">
    <div class="modal-content">
        <div style="font-weight: 900;">Admin Access</div>
        <input type="password" id="admin-password" placeholder="Password">
        <button id="admin-submit">Export JSON</button>
        <button onclick="document.getElementById('modal-overlay').style.display='none'" style="background:none; color:#999; margin-top:10px;">Cancel</button>
    </div>
</div>

<script>
(function() {
    let currentContentData = null;
    let tapCount = 0;
    let tapTimer = null;

    const statusEl = document.getElementById("status");
    const updatedEl = document.getElementById("last-updated");
    const alertBox = document.getElementById("emergency-alert");
    const listEl = document.getElementById("list");
    const noteEl = document.getElementById("note");
    const noteContainer = document.getElementById("note-container");
    const modal = document.getElementById("modal-overlay");

    const SUPABASE_URL = "https://qfzyrogwyjbzbblnvqzy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_tXLLvKe_L-27OsGU-GH3Zw_176oxBqw";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    statusEl.onclick = () => {
        tapCount++;
        clearTimeout(tapTimer);
        tapTimer = setTimeout(() => tapCount = 0, 2000);
        if (tapCount >= 5) { modal.style.display = "flex"; document.getElementById("admin-password").focus(); }
    };

    document.getElementById("admin-submit").onclick = () => {
        if (document.getElementById("admin-password").value === "password") {
            const el = document.createElement('textarea');
            el.value = JSON.stringify(currentContentData, null, 2);
            document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            alert("JSONをコピーしました"); modal.style.display = "none";
        } else { alert("Incorrect password"); }
    };

    function render(data) {
        if (!data || data.length === 0) return;
        const row = data[0];

        if (row.alert && row.alert.trim() !== "" && row.alert !== "なし") {
            alertBox.innerText = `🚨${row.alert}`;
            alertBox.style.display = "block";
        } else {
            alertBox.style.display = "none";
        }

        const date = new Date(row.updated_at || row.created_at);
        updatedEl.innerText = `最終更新日:${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;

        if (row.note && row.note.trim() !== "" && row.note !== "なし") {
            noteEl.innerText = row.note;
            noteContainer.style.display = "block";
        } else {
            noteContainer.style.display = "none";
        }

        try {
            const episodes = typeof row.content === 'string' ? JSON.parse(row.content) : row.content;
            currentContentData = episodes;
            listEl.innerHTML = episodes.map(ep => `
                <div class="episode-card">
                    <div class="episode-header">
                        <span class="episode-number">放送番号：${ep.number || "-"}</span>
                        <span class="episode-date">放送日：${ep.date || "-"}</span>
                    </div>
                    <div class="info-item"><span class="label">【OP】</span><span class="content">${ep.opening || ""}</span></div>
                    <div class="info-item"><span class="label">【企画】</span><span class="content">${ep.trivia || ""}</span></div>
                    <div class="info-item"><span class="label">【ED】</span><span class="content">${ep.ending || ""}</span></div>
                </div>
            `).join('');
        } catch (e) { console.error(e); }
    }

    async function loadData() {
        const { data, error } = await supabase.from("broadcasts").select("*").order("created_at", { ascending: false }).limit(1);
        if (!error) { render(data); statusEl.innerText = "Synced"; }
    }

    setInterval(loadData, 1000);
    loadData();
})();
</script>
</body>
</html>
