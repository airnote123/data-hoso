<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>放送表示（リアルタイム）</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
.preserve { white-space: pre-wrap; }
</style>
</head>

<body class="bg-slate-100 p-6">

<h1 class="text-2xl font-bold mb-4">放送内容</h1>

<div id="status" class="text-sm text-gray-500 mb-1">読み込み中...</div>
<div id="note" class="text-sm text-blue-600 mb-4"></div>

<div id="list" class="space-y-4"></div>

<script>
// ===== Supabase設定（あなたの値）=====
const SUPABASE_URL = "https://qfzyrogwyjbzbblnvqzy.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_tXLLvKe_L-27OsGU-GH3Zw_176oxBqw";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ===== データ取得 =====
async function load() {
  const status = document.getElementById("status");
  const noteEl = document.getElementById("note");

  try {
    const { data, error } = await supabase
      .from("broadcasts")
      .select("*")
      .order("created_at", { ascending: false })
      .limit(1);

    if (error) throw error;

    if (!data || data.length === 0) {
      status.innerText = "データがありません";
      return;
    }

    const row = data[0];

    // 最終更新
    status.innerText =
      "最終更新: " + new Date(row.created_at).toLocaleString();

    // コメント
    noteEl.innerText = row.note || "";

    // JSON
    const episodes = JSON.parse(row.content);
    render(episodes);

  } catch (e) {
    console.error(e);
    status.innerText = "エラー: " + e.message;
  }
}

// ===== 表示 =====
function render(episodes) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  episodes.forEach(ep => {
    const div = document.createElement("div");
    div.className = "bg-white p-4 rounded shadow";

    div.innerHTML = `
      <div class="font-bold">${ep.number} (${ep.date})</div>

      <div class="mt-2">
        <b>オープニング</b>
        <p class="preserve">${ep.opening || ""}</p>
      </div>

      <div class="mt-2">
        <b>企画</b>
        <p class="preserve">${ep.trivia || ""}</p>
      </div>

      <div class="mt-2">
        <b>エンディング</b>
        <p class="preserve">${ep.ending || ""}</p>
      </div>
    `;

    list.appendChild(div);
  });
}

// ===== リアルタイム更新 =====
supabase
  .channel('realtime-broadcasts')
  .on(
    'postgres_changes',
    { event: 'INSERT', schema: 'public', table: 'broadcasts' },
    () => {
      load();
    }
  )
  .subscribe();

// 初回ロード
load();
</script>

</body>
</html>
