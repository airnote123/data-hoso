<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>放送表示</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

</head>
<body>

<h1>放送内容</h1>

<div id="status"></div>
<div id="note"></div>
<div id="list"></div>

<script>
const supabase = window.supabase.createClient(
  "https://qfzyrogwyjbzbblnvqzy.supabase.co",
  "sb_publishable_tXLLvKe_L-27OsGU-GH3Zw_176oxBqw"
);

async function load() {
  const status = document.getElementById("status");
  const list = document.getElementById("list");
  const note = document.getElementById("note");

  status.innerText = "通信中...";

  try {
    const { data, error } = await supabase
      .from("broadcasts")
      .select("*")
      .order("created_at", { ascending: false })
      .limit(1);

    if (error) {
      status.innerText = "❌ エラー: " + error.message;
      return;
    }

    if (!data || data.length === 0) {
      status.innerText = "❌ データなし";
      return;
    }

    const row = data[0];

    status.innerText = "✅ 取得成功";

    note.innerText = row.note || "";

    // ★ここが最重要
    let episodes;
    try {
      episodes = JSON.parse(row.content);
    } catch (e) {
      status.innerText = "❌ JSONエラー: " + e.message;
      return;
    }

    list.innerHTML = "";

    episodes.forEach(ep => {
      const div = document.createElement("div");

      div.innerHTML = `
        <hr>
        <b>${ep.number}</b> (${ep.date})<br>
        【OP】${ep.opening}<br>
        【企画】${ep.trivia}<br>
        【ED】${ep.ending}
      `;

      list.appendChild(div);
    });

  } catch (e) {
    status.innerText = "❌ 重大エラー: " + e.message;
  }
}

load();
</script>

</body>
</html>
