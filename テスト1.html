<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>放送表示デバッグ</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
.preserve { white-space: pre-wrap; }
</style>
</head>

<body class="bg-slate-100 p-6">

<h1 class="text-xl font-bold mb-4">デバッグ画面</h1>

<div id="status" class="mb-2 text-sm text-gray-700">初期化中...</div>

<div id="debug" class="bg-black text-green-400 p-3 text-xs rounded whitespace-pre-wrap mb-4"></div>

<div id="list" class="space-y-2"></div>

<script>
const SUPABASE_URL = "https://qfzyrogwyjbzbblnvqzy.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_tXLLvKe_L-27OsGU-GH3Zw_176oxBqw";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function log(msg) {
  document.getElementById("debug").innerText += msg + "\n";
}

async function load() {
  const status = document.getElementById("status");

  log("①開始");

  try {
    const res = await supabase
      .from("broadcasts")
      .select("*");

    log("②取得完了");

    log("data ↓");
    log(JSON.stringify(res.data));

    log("error ↓");
    log(JSON.stringify(res.error));

    if (res.error) {
      status.innerText = "❌ エラーあり";
      return;
    }

    if (!res.data || res.data.length === 0) {
      status.innerText = "⚠️ データなし";
      return;
    }

    const row = res.data[0];

    log("③content ↓");
    log(row.content);

    let episodes;
    try {
      episodes = JSON.parse(row.content);
      log("④JSON OK");
    } catch (e) {
      status.innerText = "❌ JSONエラー";
      log("JSONエラー: " + e.message);
      return;
    }

    status.innerText = "✅ 表示成功";

    render(episodes);

  } catch (e) {
    status.innerText = "❌ 重大エラー";
    log("重大エラー: " + e.message);
  }
}

function render(episodes) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  episodes.forEach(ep => {
    const div = document.createElement("div");
    div.className = "bg-white p-2 rounded shadow";

    div.innerHTML = `
      <b>${ep.number}</b> (${ep.date})
    `;

    list.appendChild(div);
  });
}

load();
</script>

</body>
</html>
