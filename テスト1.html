<script>
const SUPABASE_URL = "https://qfzyrogwyjbzbblnvqzy.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_tXLLvKe_L-27OsGU-GH3Zw_176oxBqw";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const debug = document.getElementById("debug");
function log(msg) {
  debug.innerText += msg + "\n";
}

async function load() {
  log("①開始");

  try {
    const res = await supabase
      .from("broadcasts")
      .select("*");

    log("②レスポンス取得");

    log("data ↓");
    log(JSON.stringify(res.data));

    log("error ↓");
    log(JSON.stringify(res.error));

    if (res.error) {
      log("❌ エラーあり");
      return;
    }

    if (!res.data || res.data.length === 0) {
      log("⚠️ データなし");
      return;
    }

    const row = res.data[0];

    log("③content ↓");
    log(row.content);

    let parsed;
    try {
      parsed = JSON.parse(row.content);
      log("④JSON OK");
    } catch (e) {
      log("❌ JSONエラー");
      return;
    }

    log("⑤表示開始");

    parsed.forEach(ep => {
      log("・" + ep.number);
    });

  } catch (e) {
    log("❌ 重大エラー: " + e.message);
  }
}

load();
</script>
